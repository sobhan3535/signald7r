name: Signal Watcher

on:
  schedule:
    # هر ۱۵ دقیقه اجرا می‌شود — اگر INTERVAL را در Secrets عوض کردی، این عدد را هم هماهنگ کن
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # امکان اجرای دستی از تب Actions برای تست

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run signal check
        env:
          SYMBOL: ${{ secrets.SYMBOL }}
          INTERVAL: ${{ secrets.INTERVAL }}
          FAST_LEN: ${{ secrets.FAST_LEN }}
          SLOW_LEN: ${{ secrets.SLOW_LEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python check_signal.py
